name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - "packages/lakeanalysis/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - "packages/lakeanalysis/**"

jobs:
  workspace-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - run: uv lock --check

  lakeanalysis-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      - run: uv sync --package lakeanalysis --group dev
      - run: uv run --package lakeanalysis pylint packages/lakeanalysis/src/lakeanalysis
      - run: uv run --package lakeanalysis pytest packages/lakeanalysis/tests
