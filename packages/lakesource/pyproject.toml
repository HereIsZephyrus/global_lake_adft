[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakesource"]

[project]
name = "lakesource"
version = "0.1.0"
description = "Unified data access layer for lake analysis (PostgreSQL + Parquet backends)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lakeanalysis",
    "python-dotenv>=1.0",
    "pandas>=2.0,<3",
    "numpy>=1.24,<2.3",
    "duckdb>=1.5.0",
    "pyarrow>=14.0,<18",
]

[project.optional-dependencies]
postgres = [
    "psycopg[binary]>=3.2",
    "geoalchemy2>=0.14",
]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "pytest>=8.4.2",
]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
