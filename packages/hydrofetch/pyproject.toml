[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hydrofetch"
version = "0.1.0"
description = "GEE image export, Drive download, local raster sampling and lake forcing pipeline"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "earthengine-api>=1.7.0",
    "google-auth>=2.0",
    "google-auth-oauthlib>=1.0",
    "google-api-python-client>=2.0",
    "python-dotenv>=1.0",
    "numpy>=2.0",
    "rasterio>=1.4",
    "pandas>=2.0",
    "pyarrow>=14.0",
    "shapely>=2.0",
    "matplotlib>=3.10.8",
    "psycopg[binary]>=3.2",
]

[project.scripts]
hydrofetch = "hydrofetch.cli:main"

[project.optional-dependencies]
plot = ["matplotlib>=3.8"]

[dependency-groups]
dev = [
    "pylint>=4.0",
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hydrofetch"]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
