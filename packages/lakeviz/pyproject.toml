[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakeviz"]

[project]
name = "lakeviz"
version = "0.1.0"
description = "Global spatial visualization for lake drought-flood abrupt transitions"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "lakesource",
    "pandas>=2.0,<3",
    "numpy>=1.24,<2.3",
    "scipy>=1.11",
    "geopandas>=0.14",
    "cartopy>=0.22",
    "matplotlib>=3.5",
]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "pytest>=8.4.2",
]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
