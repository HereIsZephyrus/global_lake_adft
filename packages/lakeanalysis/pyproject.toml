[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakeanalysis"]

[project]
name = "lakeanalysis"
version = "0.1.0"
description = "Lake analysis, statistical modelling, and downstream data access tools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "psycopg[binary]>=3.2",
    "geoalchemy2>=0.14",
    "python-dotenv>=1.0",
    "pandas>=3.0.1",
    "numpy>=2.4.3",
    "pymannkendall>=1.4.3",
    "statsmodels>=0.14.0",
    "matplotlib>=3.10.8",
    "pyarrow>=23.0.1",
]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "pytest>=8.4.2",
]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
