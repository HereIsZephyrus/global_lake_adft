[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakeanalysis"]

[project]
name = "lakeanalysis"
version = "0.1.0"
description = "Lake analysis, statistical modelling, and downstream data access tools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "python-dotenv>=1.0",
    "pandas>=3.0,<4",
    "numpy>=2.3,<3",
    "pyarrow>=23.0,<25",
    "pymannkendall>=1.4.3",
    "statsmodels>=0.14.0",
    "lakesource",
    "lakeviz",
    "mpi4py>=4.1.1",
    "numba>=0.60.0",
    "typer[all]>=0.25.1",
    "pyyaml>=6.0.3",
]

[project.optional-dependencies]
remote = [
    "paramiko>=3.5",
]

[project.scripts]
lake_adft = "lakeanalysis.cli:app"

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "pytest>=8.4.2",
]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
