[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lakeanalysis"]

[project]
name = "lakeanalysis"
version = "0.1.0"
description = "Lake analysis, statistical modelling, and downstream data access tools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "python-dotenv>=1.0",
    "pandas>=2.0,<3",
    "numpy>=1.24,<2.3",
    "pyarrow>=14.0,<18",
    "pymannkendall>=1.4.3",
    "statsmodels>=0.14.0",
    "lakesource",
]

[project.optional-dependencies]
plot = [
    "matplotlib>=3.5",
]

[dependency-groups]
dev = [
    "pylint>=4.0.5",
    "pytest>=8.4.2",
]

[tool.pylint.main]
source-roots = ["src"]

[tool.pylint.format]
max-line-length = 100

[tool.pylint."messages control"]
disable = [
    "missing-module-docstring",
    "too-few-public-methods",
]
