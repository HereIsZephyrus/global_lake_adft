# Layer 5: Area Quality Assessment

filters:
  zero_quantile: 0.80
  flat:
    dominant_ratio_threshold: 0.8
    round_digits: null
  area_ratio:
    min_ratio: 0.1
    max_ratio: 10.0
  penalized_volatility:
    pv_threshold: 0.001
  outside_range:
    tolerance: 0.5
  shift:
    p_value_thresh: 0.05
    smooth_window: 12
    min_segment_months: 24
    seasonality_threshold: 0.3
    udmax_critical: 8.88
    wdmax_critical: 9.91
