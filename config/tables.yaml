# Layer 3: Table Name Mapping
#
# Logical name -> actual PostgreSQL table name / Parquet file name.
# Logical names are used uniformly in code; actual names are resolved via this mapping.
# When a logical name is not found, it falls back to the logical name itself.

series_db:
  lake_area: lake_area
  lake_info: lake_info
  anomaly: anomaly
  area_quality: area_quality
  area_anomalies: area_anomalies
  quality_run_status: quality_run_status
  area_shift_labels: area_shift_labels
  area_processed: area_processed
  af_nearest: af_nearest
  lake_pfaf: lake_pfaf
  entropy: entropy
  eot_results: eot_results
  eot_extremes: eot_extremes
  eot_run_status: eot_run_status
  pwm_hawkes_results: pwm_hawkes_results
  pwm_hawkes_lrt: pwm_hawkes_lrt
  pwm_hawkes_transition_monthly: pwm_hawkes_transition_monthly
  eot_hawkes_results: eot_hawkes_results
  eot_hawkes_lrt: eot_hawkes_lrt
  eot_hawkes_transition_monthly: eot_hawkes_transition_monthly
  eot_hawkes_run_status: eot_hawkes_run_status
  interpolation_detect: interpolation_detect
  quantile_labels: quantile_labels
  quantile_extremes: quantile_extremes
  quantile_abrupt_transitions: quantile_abrupt_transitions
  quantile_run_status: quantile_run_status
  pwm_extreme_thresholds: pwm_extreme_thresholds
  pwm_extreme_labels: pwm_extreme_labels
  pwm_extreme_extremes: pwm_extreme_extremes
  pwm_extreme_abrupt_transitions: pwm_extreme_abrupt_transitions
  pwm_extreme_run_status: pwm_extreme_run_status
  pwm_hawkes_run_status: pwm_hawkes_run_status
  comparison_labels: comparison_labels
  comparison_thresholds: comparison_thresholds
  comparison_extremes: comparison_extremes
  comparison_agreement: comparison_agreement
  comparison_run_status: comparison_run_status

atlas_db:
  lake_geometry: LakeATLAS_v10_pol
  basin_atlas_lev05: BasinATLAS_v10_lev05
  basin_atlas_lev11: BasinATLAS_v10_lev11

  geometry:
    id_column: hylak_id
    geom_column: geom
    simplify_meters: 0

parquet:
  lake_area: lake_area
  lake_info: lake_info
  anomaly: anomaly
  area_quality: area_quality
  area_anomalies: area_anomalies
  quality_run_status: quality_run_status
  area_shift_labels: area_shift_labels
  af_nearest: af_nearest
  eot_extremes: eot_extremes
  pwm_hawkes_results: pwm_hawkes_results
  eot_hawkes_results: eot_hawkes_results
  interpolation_detect: interpolation_detect
  quantile_extremes: quantile_extremes
  quantile_abrupt_transitions: quantile_abrupt_transitions
  quantile_run_status: quantile_run_status
  pwm_extreme_thresholds: pwm_extreme_thresholds
  pwm_extreme_run_status: pwm_extreme_run_status
  comparison_labels: comparison_labels
  comparison_thresholds: comparison_thresholds
  comparison_extremes: comparison_extremes
  comparison_agreement: comparison_agreement
  comparison_run_status: comparison_run_status

# Tables exempt from PARQUET_TABLE_SUFFIX — these are source data, never
# test-specific.  Output tables (pwm_extreme_*, quantile_*, etc.) still
# receive the suffix when the env var is set.
parquet_suffix_exempt:
  - lake_area
  - lake_info
  - area_quality
  - area_anomalies
